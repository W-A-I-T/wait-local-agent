name: release-desktop

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  desktop:
    name: ${{ matrix.os }} desktop bundle
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          package-manager-cache: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libappindicator3-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            patchelf

      - name: Install Python sidecar dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[desktop]"

      - name: Install UI dependencies
        run: npm ci
        working-directory: ui

      - name: Install desktop dependencies
        run: npm install --no-audit --no-fund
        working-directory: desktop

      - name: Build the target sidecar
        shell: bash
        run: bash packaging/build-sidecar.sh

      - name: Build and publish the draft release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: desktop
          tagName: ${{ github.ref_name }}
          releaseName: WAIT Local Agent ${{ github.ref_name }}
          releaseDraft: true
