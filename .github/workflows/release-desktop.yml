name: release-desktop

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  desktop:
    name: ${{ matrix.os }} desktop bundle
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15-intel, macos-latest, windows-latest]

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          package-manager-cache: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ runner.os == 'macOS' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libappindicator3-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            patchelf

      - name: Install Python sidecar dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[desktop]"

      - name: Install UI dependencies
        run: npm ci
        working-directory: ui

      - name: Install desktop dependencies
        run: npm install --no-audit --no-fund
        working-directory: desktop

      - name: Build the target sidecar
        shell: bash
        run: bash packaging/build-sidecar.sh

      - name: Detect macOS signing secrets
        if: runner.os == 'macOS'
        id: macos_signing
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [[ -n "$APPLE_CERTIFICATE" && \
            -n "$APPLE_CERTIFICATE_PASSWORD" && \
            -n "$APPLE_SIGNING_IDENTITY" && \
            -n "$APPLE_ID" && \
            -n "$APPLE_PASSWORD" && \
            -n "$APPLE_TEAM_ID" ]]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Import Windows signing certificate
        if: runner.os == 'Windows'
        id: windows_signing
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE) -or
              [string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE_PASSWORD)) {
            "ready=false" >> $env:GITHUB_OUTPUT
            exit 0
          }

          $signingDir = Join-Path $env:RUNNER_TEMP "wait-local-agent-signing"
          New-Item -ItemType Directory -Force -Path $signingDir | Out-Null
          $encodedCertificate = Join-Path $signingDir "certificate.txt"
          $certificatePath = Join-Path $signingDir "certificate.pfx"
          [System.IO.File]::WriteAllText($encodedCertificate, $env:WINDOWS_CERTIFICATE)
          certutil.exe -decode $encodedCertificate $certificatePath | Out-Null

          $password = ConvertTo-SecureString $env:WINDOWS_CERTIFICATE_PASSWORD -AsPlainText -Force
          $certificate = Import-PfxCertificate -FilePath $certificatePath `
            -CertStoreLocation Cert:\CurrentUser\My -Password $password
          $thumbprint = ($certificate | Where-Object HasPrivateKey | Select-Object -First 1).Thumbprint
          if ([string]::IsNullOrWhiteSpace($thumbprint)) {
            throw "The Windows signing certificate did not provide a thumbprint"
          }

          $config = [ordered]@{
            bundle = [ordered]@{
              windows = [ordered]@{
                certificateThumbprint = $thumbprint
                digestAlgorithm = "sha256"
                timestampUrl = "http://timestamp.digicert.com"
              }
            }
          }
          $config | ConvertTo-Json -Depth 5 | Set-Content `
            -Path "desktop/src-tauri/tauri.windows-signing.conf.json" -Encoding utf8NoBOM
          Remove-Item -Force $encodedCertificate, $certificatePath
          "ready=true" >> $env:GITHUB_OUTPUT

      - name: Build and publish the draft release (macOS signed)
        if: runner.os == 'macOS' && steps.macos_signing.outputs.ready == 'true'
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: desktop
          tagName: ${{ github.ref_name }}
          releaseName: WAIT Local Agent ${{ github.ref_name }}
          releaseDraft: true

      - name: Build and publish the draft release (macOS unsigned)
        if: runner.os == 'macOS' && steps.macos_signing.outputs.ready != 'true'
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: desktop
          tagName: ${{ github.ref_name }}
          releaseName: WAIT Local Agent ${{ github.ref_name }}
          releaseDraft: true

      - name: Build and publish the draft release (Windows signed)
        if: runner.os == 'Windows' && steps.windows_signing.outputs.ready == 'true'
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: desktop
          tagName: ${{ github.ref_name }}
          releaseName: WAIT Local Agent ${{ github.ref_name }}
          releaseDraft: true
          args: --config src-tauri/tauri.windows-signing.conf.json

      - name: Build and publish the draft release (Windows unsigned)
        if: runner.os == 'Windows' && steps.windows_signing.outputs.ready != 'true'
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: desktop
          tagName: ${{ github.ref_name }}
          releaseName: WAIT Local Agent ${{ github.ref_name }}
          releaseDraft: true

      - name: Build and publish the draft release (Linux)
        if: runner.os == 'Linux'
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: desktop
          tagName: ${{ github.ref_name }}
          releaseName: WAIT Local Agent ${{ github.ref_name }}
          releaseDraft: true

      - name: Publish Linux integrity artifacts
        if: runner.os == 'Linux'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          set -euo pipefail

          bundle_dir="desktop/src-tauri/target/release/bundle"
          mapfile -t linux_assets < <(
            find "$bundle_dir/appimage" "$bundle_dir/deb" "$bundle_dir/rpm" -maxdepth 1 -type f \
              \( -name '*.AppImage' -o -name '*.deb' -o -name '*.rpm' \) -print | sort
          )
          if (( ${#linux_assets[@]} == 0 )); then
            echo "No Linux AppImage, deb, or rpm bundle was produced" >&2
            exit 1
          fi

          checksum_file="$bundle_dir/SHA256SUMS"
          : > "$checksum_file"
          for asset in "${linux_assets[@]}"; do
            relative_asset="${asset#"$bundle_dir/"}"
            (cd "$bundle_dir" && sha256sum "$relative_asset") >> "$checksum_file"
          done

          upload_files=("$checksum_file")
          if [[ -n "${GPG_PRIVATE_KEY:-}" && -n "${GPG_PASSPHRASE:-}" ]]; then
            gpg_home="$RUNNER_TEMP/wait-local-agent-gnupg"
            mkdir -m 700 -p "$gpg_home"
            export GNUPGHOME="$gpg_home"
            trap 'rm -rf -- "$gpg_home"' EXIT

            printf '%s' "$GPG_PRIVATE_KEY" | gpg --batch --import
            printf '%s' "$GPG_PASSPHRASE" | gpg --batch --yes \
              --pinentry-mode loopback --passphrase-fd 0 --armor --detach-sign \
              --output "$bundle_dir/SHA256SUMS.asc" "$checksum_file"
            upload_files+=("$bundle_dir/SHA256SUMS.asc")
          else
            echo "GPG signing secrets are absent; publishing SHA256SUMS only"
          fi

          gh release upload "$GITHUB_REF_NAME" "${upload_files[@]}" --clobber
          rm -f -- "$checksum_file" "$bundle_dir/SHA256SUMS.asc"
