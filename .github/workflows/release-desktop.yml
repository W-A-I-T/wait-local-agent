name: release-desktop

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  desktop:
    name: ${{ matrix.os }} desktop bundle
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          package-manager-cache: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up universal2 Python for macOS sidecar
        if: runner.os == 'macOS'
        shell: bash
        run: |
          python_version="3.12.10"
          installer_url="https://www.python.org/ftp/python/${python_version}/python-${python_version}-macos11.pkg"
          installer_path="$RUNNER_TEMP/python-${python_version}-macos11.pkg"
          expected_md5="8f4989592c9412e51fcad70273442c22"

          curl --fail --location --retry 3 --output "$installer_path" "$installer_url"
          actual_md5="$(md5 -q "$installer_path")"
          if [[ "$actual_md5" != "$expected_md5" ]]; then
            echo "Python installer checksum mismatch: $actual_md5" >&2
            exit 1
          fi
          sudo installer -pkg "$installer_path" -target /

          universal_python="/Library/Frameworks/Python.framework/Versions/3.12/bin/python3.12"
          if [[ ! -x "$universal_python" ]]; then
            echo "The python.org universal2 Python executable was not installed" >&2
            exit 1
          fi
          archs="$(lipo -archs "$universal_python")"
          if [[ "$archs" != *x86_64* || "$archs" != *arm64* ]]; then
            echo "Expected universal2 Python, found architectures: $archs" >&2
            exit 1
          fi

          venv_path="$RUNNER_TEMP/wait-local-agent-universal2-venv"
          "$universal_python" -m venv "$venv_path"
          echo "WAIT_SIDECAR_PYTHON=$venv_path/bin/python" >> "$GITHUB_ENV"
          echo "Verified universal2 Python $($venv_path/bin/python --version 2>&1): $archs"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ runner.os == 'macOS' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libappindicator3-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            patchelf

      - name: Install Python sidecar dependencies
        run: |
          python_bin="${WAIT_SIDECAR_PYTHON:-python}"
          "$python_bin" -m pip install --upgrade pip
          "$python_bin" -m pip install -e ".[desktop]"

      - name: Install UI dependencies
        run: npm ci
        working-directory: ui

      - name: Install desktop dependencies
        run: npm install --no-audit --no-fund
        working-directory: desktop

      - name: Build the target sidecar
        shell: bash
        run: bash packaging/build-sidecar.sh

      - name: Detect macOS signing secrets
        if: runner.os == 'macOS'
        id: macos_signing
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [[ -n "$APPLE_CERTIFICATE" && \
            -n "$APPLE_CERTIFICATE_PASSWORD" && \
            -n "$APPLE_SIGNING_IDENTITY" && \
            -n "$APPLE_ID" && \
            -n "$APPLE_PASSWORD" && \
            -n "$APPLE_TEAM_ID" ]]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Import Windows signing certificate
        if: runner.os == 'Windows'
        id: windows_signing
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE) -or
              [string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE_PASSWORD)) {
            "ready=false" >> $env:GITHUB_OUTPUT
            exit 0
          }

          $signingDir = Join-Path $env:RUNNER_TEMP "wait-local-agent-signing"
          New-Item -ItemType Directory -Force -Path $signingDir | Out-Null
          $encodedCertificate = Join-Path $signingDir "certificate.txt"
          $certificatePath = Join-Path $signingDir "certificate.pfx"
          [System.IO.File]::WriteAllText($encodedCertificate, $env:WINDOWS_CERTIFICATE)
          certutil.exe -decode $encodedCertificate $certificatePath | Out-Null

          $password = ConvertTo-SecureString $env:WINDOWS_CERTIFICATE_PASSWORD -AsPlainText -Force
          $certificate = Import-PfxCertificate -FilePath $certificatePath `
            -CertStoreLocation Cert:\CurrentUser\My -Password $password
          $thumbprint = ($certificate | Where-Object HasPrivateKey | Select-Object -First 1).Thumbprint
          if ([string]::IsNullOrWhiteSpace($thumbprint)) {
            throw "The Windows signing certificate did not provide a thumbprint"
          }

          $config = [ordered]@{
            bundle = [ordered]@{
              windows = [ordered]@{
                certificateThumbprint = $thumbprint
                digestAlgorithm = "sha256"
                timestampUrl = "http://timestamp.digicert.com"
              }
            }
          }
          $config | ConvertTo-Json -Depth 5 | Set-Content `
            -Path "desktop/src-tauri/tauri.windows-signing.conf.json" -Encoding utf8NoBOM
          Remove-Item -Force $encodedCertificate, $certificatePath
          "ready=true" >> $env:GITHUB_OUTPUT

      - name: Build and publish the draft release (macOS signed)
        if: runner.os == 'macOS' && steps.macos_signing.outputs.ready == 'true'
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: desktop
          tagName: ${{ github.ref_name }}
          releaseName: WAIT Local Agent ${{ github.ref_name }}
          releaseDraft: true
          args: --target universal-apple-darwin

      - name: Build and publish the draft release (macOS unsigned)
        if: runner.os == 'macOS' && steps.macos_signing.outputs.ready != 'true'
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: desktop
          tagName: ${{ github.ref_name }}
          releaseName: WAIT Local Agent ${{ github.ref_name }}
          releaseDraft: true
          args: --target universal-apple-darwin

      - name: Build and publish the draft release (Windows signed)
        if: runner.os == 'Windows' && steps.windows_signing.outputs.ready == 'true'
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: desktop
          tagName: ${{ github.ref_name }}
          releaseName: WAIT Local Agent ${{ github.ref_name }}
          releaseDraft: true
          args: --config src-tauri/tauri.windows-signing.conf.json

      - name: Build and publish the draft release (Windows unsigned)
        if: runner.os == 'Windows' && steps.windows_signing.outputs.ready != 'true'
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: desktop
          tagName: ${{ github.ref_name }}
          releaseName: WAIT Local Agent ${{ github.ref_name }}
          releaseDraft: true

      - name: Build and publish the draft release (Linux)
        if: runner.os == 'Linux'
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: desktop
          tagName: ${{ github.ref_name }}
          releaseName: WAIT Local Agent ${{ github.ref_name }}
          releaseDraft: true
